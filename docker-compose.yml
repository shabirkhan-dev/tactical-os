# Project entrypoint: Postgres for local development. Fragments live under docker/compose/.
# Requires Docker Compose v2.20+ (include). From repo root:
#   cp env.docker.example .env && docker compose up -d
# Nest API runs on the host via `bun --cwd apps/nest-api run dev` until a compose fragment is added.

name: school-os

include:
  - docker/compose/postgres.yml
  - docker/compose/rust-api.yml
