services:
  rust-api:
    build:
      context: ../..
      dockerfile: apps/rust/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hono}:${POSTGRES_PASSWORD:-hono}@postgres:5432/${POSTGRES_DB:-hono}
      PORT: 3002
      APP_NAME: school-os-rust
      APP_VERSION: 0.1.0
      NODE_ENV: production
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
