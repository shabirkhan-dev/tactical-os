# Optional AI FastAPI service — docker compose --profile ai up -d --build
services:
  ai-api:
    profiles: ["ai"]
    build:
      context: ../..
      dockerfile: apps/ai-api/Dockerfile
    image: school-os-ai-api:local
    restart: unless-stopped
    environment:
      APP_NAME: school-os-ai-api
      ENVIRONMENT: production
      PORT: 8000
      API_PREFIX: /api/v1
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:?Set AI_SERVICE_TOKEN in .env}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CORS_ORIGINS: ${AI_CORS_ORIGINS:-http://nest-api:4000}
    ports:
      - "${AI_API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
