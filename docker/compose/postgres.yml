# Postgres service — included from root docker-compose.yml
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-school-os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-school-os}
      POSTGRES_DB: ${POSTGRES_DB:-school-os}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-school-os} -d ${POSTGRES_DB:-school-os}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
