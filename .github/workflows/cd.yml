# CD: staged release workflow with overridable deploy hooks.
name: CD

on:
	push:
		branches: [main]
		tags:
			- "v*"
	workflow_dispatch:

jobs:
	quality-gate:
		runs-on: ubuntu-latest
		steps:
			- uses: actions/checkout@v4

			- name: Setup Bun
				uses: oven-sh/setup-bun@v2
				with:
					bun-version: latest

			- name: Install dependencies
				run: bun install --frozen-lockfile

			- name: Validate release gate
				run: bun run preflight

	deploy-staging:
		if: github.ref == 'refs/heads/main'
		needs: quality-gate
		runs-on: ubuntu-latest
		environment: staging
		steps:
			- uses: actions/checkout@v4
			- name: Deploy to staging
				run: |
					echo "Replace with your staging deploy command."
					echo "Example: bun run deploy:staging"
			- name: Staging health check
				run: |
					echo "Replace with staging health check."
					echo "Example: curl --fail $STAGING_HEALTHCHECK_URL"

	deploy-production:
		if: startsWith(github.ref, 'refs/tags/v')
		needs: quality-gate
		runs-on: ubuntu-latest
		environment: production
		steps:
			- uses: actions/checkout@v4
			- name: Deploy to production
				run: |
					echo "Replace with your production deploy command."
					echo "Example: bun run deploy:production"
			- name: Production health check
				run: |
					echo "Replace with production health check."
					echo "Example: curl --fail $PROD_HEALTHCHECK_URL"
