# CD: staged release workflow with overridable deploy hooks.
name: CD

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Validate release gate
        run: bun run preflight
        env:
          # sqlx compile-time checks need a URL shape; no live DB required for demo app skips
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci

  deploy-staging:
    if: github.ref == 'refs/heads/main'
    needs: quality-gate
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "Replace with your staging deploy command."
          echo "Example: bun run deploy:staging"
      - name: Staging health check
        run: |
          echo "Replace with staging health check."
          echo "Example: curl --fail $STAGING_HEALTHCHECK_URL"

  deploy-production:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: quality-gate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          echo "Replace with your production deploy command."
          echo "Example: bun run deploy:production"
      - name: Production health check
        run: |
          echo "Replace with production health check."
          echo "Example: curl --fail $PROD_HEALTHCHECK_URL"
