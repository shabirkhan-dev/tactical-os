# Render Blueprint — Nest API + Neon (external).
# https://render.com/docs/blueprint-spec
#
# Neon: create a project at https://console.neon.tech, copy the pooled
# connection string into DATABASE_URL in the Render dashboard (or sync:false below).
#
# After first deploy, set CORS_ORIGIN / WEB_APP_URL / WEBAUTHN_* to your Vercel web URL.

services:
  - type: web
    name: school-os-nest-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./apps/nest-api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: COOKIE_SAME_SITE
        value: none
      - key: RUN_MIGRATIONS
        value: "true"
      - key: DATABASE_POOL_MAX
        value: "10"
      - key: AUTH_DEV_EXPOSE_CODES
        value: "false"
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: APP_NAME
        value: School OS
      # Paste from Neon console (pooled URL recommended).
      - key: DATABASE_URL
        sync: false
      # Generate strong secrets in the Render dashboard if empty after create.
      - key: JWT_SECRET
        generateValue: true
      - key: AUTH_TOKEN_SECRET
        generateValue: true
      - key: AI_SERVICE_TOKEN
        generateValue: true
      # Required for auth emails in production (https://resend.com).
      - key: RESEND_API_KEY
        sync: false
      - key: AUTH_EMAIL_FROM
        sync: false
      # Set after Vercel web is live, e.g. https://school-os.vercel.app
      - key: WEB_APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: WEBAUTHN_RP_ID
        sync: false
      - key: WEBAUTHN_ORIGIN
        sync: false
      # Optional until apps/ai-api is hosted; use a public URL or leave localhost
      # (assist routes will fail until set).
      - key: AI_API_URL
        value: http://127.0.0.1:8000
